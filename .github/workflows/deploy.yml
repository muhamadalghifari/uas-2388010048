name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-static:
    name: Static Web Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check static-web changes
        id: static-changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            static:
              - 'static-web/**'

      - name: Login to Docker Hub
        if: steps.static-changes.outputs.static == 'true'
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push static-web
        if: steps.static-changes.outputs.static == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./static-web
          push: true
          tags: muhamadalghifari/static-web:latest

      - name: Deploy static-web to EC2
        if: steps.static-changes.outputs.static == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/uas-2388010048
            docker compose pull static-web
            docker compose up -d static-web
            docker image prune -f

  build-dynamic:
    name: Dynamic App Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check dynamic-app changes
        id: dynamic-changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            dynamic:
              - 'dynamic-app/**'

      - name: Login to Docker Hub
        if: steps.dynamic-changes.outputs.dynamic == 'true'
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push dynamic-app
        if: steps.dynamic-changes.outputs.dynamic == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./dynamic-app
          push: true
          tags: muhamadalghifari/dynamic-app:latest

      - name: Deploy dynamic-app to EC2
        if: steps.dynamic-changes.outputs.dynamic == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/uas-2388010048
            docker compose pull dynamic-app
            docker compose up -d dynamic-app
            docker image prune -f
